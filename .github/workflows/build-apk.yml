name: Build APK + Continuous Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🧱 Iniciar compilación...
        run: |
          # Si no existe gradlew, lo generamos
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: 🏗️ Compilar APK Debug
        run: |
          echo "🔧 Compilando..."
          ./gradlew assembleDebug
          echo "✅ Compilación exitosa"

      - name: 📦 Crear/Actualizar Release Continua
        uses: ncipollo/release-action@v1
        with:
          tag: "continuous"
          name: "📱 HackDroid - Continuous Build"
          body: |
            ## 🚀 HackDroid - Build Automático
            
            **Commit:** ${{ github.sha }}
            **Rama:** ${{ github.ref_name }}
            **Fecha:** ${{ github.event.head_commit.timestamp || github.run_id }}
            
            ---
            *Build generado automáticamente por GitHub Actions*
          artifacts: "app/build/outputs/apk/debug/app-debug.apk"
          replacesArtifacts: true
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
