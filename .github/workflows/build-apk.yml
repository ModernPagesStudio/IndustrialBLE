name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub.com

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🤖 Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Generar Gradle Wrapper (si no existe)
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.5
          fi
        shell: bash

      - name: 🏗️ Compilar APK de depuración
        run: ./gradlew assembleDebug
        shell: bash

      - name: 📤 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: IndustrialBLE-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
